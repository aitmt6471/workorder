<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>자재 출고 요청서</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="출고요청서">
<link rel="manifest" href="feeder-manifest.json">
<link rel="apple-touch-icon" href="ait-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--primary:#3b82f6;--primary-dark:#1e40af;--text-main:#1e3a8a;--bg:#f1f5f9}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','Malgun Gothic',sans-serif;background:var(--bg);color:#1a1a1a;font-size:14px;-webkit-tap-highlight-color:transparent}

.bg-blobs{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;overflow:hidden;pointer-events:none}
.blob{position:absolute;border-radius:40% 60% 70% 30%/40% 50% 60% 50%;filter:blur(60px);opacity:.35;animation:morphBlob 20s ease-in-out infinite alternate}
.blob-1{background:#dbeafe;width:500px;height:500px;top:-10%;left:-10%;animation-duration:20s}
.blob-2{background:#e0e7ff;width:400px;height:400px;bottom:-5%;right:-5%;border-radius:60% 40% 30% 70%/60% 30% 70% 40%;animation-duration:18s;animation-direction:alternate-reverse}
.blob-3{background:#cbd5e1;width:300px;height:300px;top:40%;left:20%;border-radius:30% 70% 70% 30%/30% 30% 70% 70%;animation-duration:25s;opacity:.15}
@keyframes morphBlob{0%{border-radius:40% 60% 70% 30%/40% 50% 60% 50%;transform:translate(0,0)}100%{border-radius:60% 40% 30% 70%/60% 30% 70% 40%;transform:translate(40px,40px) rotate(15deg)}}

.header{background:#ffffff;color:#111;padding:14px 18px;position:sticky;top:0;z-index:100;text-align:center;border-bottom:1px solid #e5e7eb;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.header-brand{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:6px}
.header-title{font-size:17px;font-weight:800;letter-spacing:-.02em}
.refresh-btn{background:#f3f4f6;border:1px solid #d1d5db;color:#374151;border-radius:50%;width:34px;height:34px;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0}
.refresh-btn:active{background:#e5e7eb;transform:rotate(30deg)}
.last-update{font-size:11px;color:#6b7280;margin-bottom:8px;text-align:center}

.controls{display:flex;gap:8px;align-items:center}
.date-select{flex:1;padding:9px 12px;border:1px solid #d1d5db;border-radius:14px;background:#fff;color:#111;font-size:14px;font-family:inherit;-webkit-appearance:none;transition:.2s}
.date-select option{color:#1a1a1a;background:#fff}
.shift-btns{display:flex;border-radius:14px;overflow:hidden;border:1px solid #d1d5db}
.shift-btn{padding:9px 18px;border:none;background:#f9fafb;color:#374151;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;transition:.2s}
.shift-btn.active.am{background:#f59e0b;color:#fff;box-shadow:0 4px 12px rgba(245,158,11,.3)}
.shift-btn.active.pm{background:#1e3a8a;color:#fff;box-shadow:0 4px 12px rgba(30,58,138,.3)}

.main{padding:14px}

.line-section{margin-bottom:16px}
.line-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:linear-gradient(135deg,#1e3a8a,#1e40af);color:#fff;border-radius:16px 16px 0 0;cursor:pointer;user-select:none;position:relative}
.line-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#3b82f6,#6366f1)}
.line-header-left{display:flex;align-items:center;gap:8px}
.line-name{font-size:15px;font-weight:800}
.line-count{font-size:11px;color:#93c5fd}
.line-toggle{font-size:14px;transition:.2s}
.line-toggle.collapsed{transform:rotate(-90deg)}
.line-body{border:1px solid rgba(59,130,246,.15);border-top:none;border-radius:0 0 16px 16px;overflow:hidden;backdrop-filter:blur(8px)}

.mat-list{display:flex;flex-direction:column;gap:10px}
.mat-card{background:#fff;border-radius:16px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.08);transition:.2s}
.mat-card.checked-row{background:#f1f5f9;opacity:.75}
.mat-card.checked-row .mat-card-left{display:none}
.mat-card.checked-row .mat-card-info{opacity:.45}
.mat-card.checked-row .mat-card-bottom{justify-content:flex-end;margin-top:6px}
.mat-card.checked-row .mat-card-num{background:#94a3b8!important}
.mat-card-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.mat-card-num{background:#1e3a8a;color:#fff;border-radius:50%;width:24px;height:24px;min-width:24px;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;margin-top:2px}
.mat-card.am .mat-card-num{background:#f59e0b}
.mat-card-info{flex:1;min-width:0;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.mat-card-name{font-size:16px;font-weight:800;color:#111;font-family:monospace;letter-spacing:-.01em;word-break:break-word}
.mat-card-meta{font-size:16px;color:#111;font-family:monospace;font-weight:800;letter-spacing:-.01em}
.mat-card-bottom{display:flex;gap:8px;align-items:stretch;margin-bottom:0}
.mat-card-left{display:flex;flex-direction:column;gap:6px;flex:1}
.mat-card-stats{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}
.mat-stat{border-radius:10px;padding:8px 6px;text-align:center;background:#eef2fb;border:1px solid #dde5f5}
.mat-stat:nth-child(2){background:#e8eef8;border-color:#d4dfef}
.mat-stat:nth-child(3){background:#ffedd5;border-color:#fed7aa}
.mat-stat:nth-child(3) .mat-stat-value{color:#92400e}
.mat-stat:nth-child(4){background:#dcfce7;border-color:#bbf7d0}
.mat-stat:nth-child(4) .mat-stat-value{color:#166534;font-size:13px}
.mat-stat-label{font-size:10px;font-weight:600;margin-bottom:4px;color:#64748b;text-transform:uppercase;letter-spacing:.03em}
.mat-stat-value{font-size:15px;font-weight:800;color:#1e3a8a;word-break:break-all}
.mat-stat:nth-child(4) .mat-stat-value{font-size:13px}
.check-btn{width:58px;min-width:58px;padding:8px 4px;border:2px solid #dde5f5;border-radius:14px;background:#fff;color:#64748b;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;transition:.2s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;-webkit-tap-highlight-color:transparent;line-height:1.2}
.check-btn:active{transform:scale(.97)}
.check-btn.checked{border-color:#1e3a8a;background:#1e3a8a;color:#fff;box-shadow:0 4px 12px rgba(30,58,138,.25)}

.empty-state{background:rgba(255,255,255,.8);backdrop-filter:blur(12px);border-radius:20px;padding:40px 20px;text-align:center;color:#94a3b8}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-msg{font-size:14px;line-height:1.5}
.empty-sub{font-size:12px;margin-top:6px;color:#cbd5e1}

.loading{background:rgba(255,255,255,.8);backdrop-filter:blur(12px);border-radius:20px;padding:40px;text-align:center;color:#94a3b8;font-size:14px}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#1e3a8a,#1e40af);color:#fff;padding:12px 24px;border-radius:20px;font-size:13px;z-index:9999;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 24px rgba(30,58,138,.3)}
.toast.show{opacity:1}

.status-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid rgba(59,130,246,.1);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;font-size:12px;color:#64748b;box-shadow:0 -4px 16px rgba(30,58,138,.08)}
.status-shift.am{color:#92400e;font-weight:700}
.status-shift.pm{color:#1e40af;font-weight:700}
.auto-badge{background:linear-gradient(135deg,rgba(34,197,94,.15),rgba(22,163,74,.1));color:#166534;border:1px solid rgba(34,197,94,.3);padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}



@media print{
  .header,.status-bar,.toast,.bg-blobs{display:none!important}
  .line-body{display:block!important}
  .mat-qty{font-size:36px}
  body{background:#fff}
  .check-btn{display:none!important}
}
@media(min-width:480px){
  .mat-qty{font-size:56px}
}
</style>
</head>
<body>

<div class="bg-blobs" aria-hidden="true">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<div class="header">
  <div class="header-brand">
    <img src="ait-logo.png" alt="AIT" style="height:38px;width:auto;object-fit:contain">
    <div class="header-title">자재 출고 요청서</div>
    <button onclick="toggleNtfySetting()" title="푸시 알림 설정" style="background:none;border:none;font-size:18px;cursor:pointer;padding:2px 4px;color:#6b7280;flex-shrink:0">⚙️</button>
  </div>
  <div id="ntfy-panel" style="display:none;padding:8px 4px 4px;flex-direction:column;gap:8px">
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:center">
      <span style="font-size:12px;color:#6b7280;white-space:nowrap">📱 ntfy 토픽</span>
      <input id="ntfy-input" type="text" placeholder="예: ait-mrp-1234"
        style="flex:1;min-width:140px;max-width:220px;padding:6px 10px;border:1px solid #d1d5db;border-radius:10px;font-size:13px;font-family:inherit">
      <button onclick="saveNtfyTopic()"
        style="padding:6px 14px;border:none;border-radius:10px;background:#1e3a8a;color:#fff;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap">저장</button>
    </div>
    <div style="border-top:1px solid #e5e7eb;padding-top:8px;display:flex;align-items:center;justify-content:space-between;gap:8px">
      <div>
        <div id="pushStatusTxt" style="font-size:12px;font-weight:600;color:#374151">확인 중...</div>
        <div style="font-size:11px;color:#6b7280">확정 시 즉시 푸시 알림</div>
      </div>
      <button id="pushToggleBtn" onclick="handlePushToggle()"
        style="flex-shrink:0;padding:7px 14px;border-radius:10px;border:none;font-size:12px;font-weight:700;cursor:pointer;background:#1e3a8a;color:#fff;white-space:nowrap;font-family:inherit">🔔 알림 허용</button>
    </div>
    <div id="pushMsg" style="font-size:11px;text-align:center"></div>
  </div>
  <div class="last-update" id="last-update">로딩 중...</div>
  <div class="controls" style="justify-content:center">
    <select class="date-select" id="date-sel" onchange="onDateChange()">
      <option value="">날짜 선택...</option>
    </select>
    <div class="shift-btns">
      <button class="shift-btn am" id="btn-am" onclick="selectShift('am')">오전</button>
      <button class="shift-btn pm" id="btn-pm" onclick="selectShift('pm')">오후</button>
    </div>
    <button class="refresh-btn" onclick="loadData()" title="새로고침">&#x21bb;</button>
  </div>
</div>

<div class="main" id="main">
  <div class="loading">데이터 불러오는 중...</div>
</div>

<div class="status-bar">
  <span id="status-info">반장이 확정한 자재 목록</span>
  <span class="auto-badge">1분 자동갱신</span>
</div>

<div class="toast" id="toast"></div>

<script>
var currentShift = 'am';
var currentDate = '';
var confirmedData = null;
var checkedItems = {};

var CHECKED_KEY = 'mrp_feeder_checked';
var N8N_BASE = 'https://aitechn8n.ngrok.app';
var NTFY_TOPIC = localStorage.getItem('ntfy_topic') || '';
var currentItems = [];

function saveChecked(){
  try{ localStorage.setItem(CHECKED_KEY, JSON.stringify(checkedItems)); }catch(e){}
}
function loadChecked(){
  try{ checkedItems = JSON.parse(localStorage.getItem(CHECKED_KEY)||'{}'); }catch(e){ checkedItems={}; }
}

// ── ntfy 푸시 알림 ────────────────────────────────────────
function sendNtfy(title, body){
  var topic = localStorage.getItem('ntfy_topic') || '';
  if(!topic) return;
  fetch('https://ntfy.sh/'+encodeURIComponent(topic), {
    method:'POST',
    body: body,
    headers:{
      'Title': title,
      'Priority': 'high',
      'Tags': 'package',
      'Content-Type': 'text/plain; charset=utf-8'
    }
  }).catch(function(){});
}

function saveNtfyTopic(){
  var val = (document.getElementById('ntfy-input')||{}).value || '';
  val = val.trim();
  localStorage.setItem('ntfy_topic', val);
  NTFY_TOPIC = val;
  document.getElementById('ntfy-panel').style.display = 'none';
  showToast(val ? '📱 ntfy 토픽 저장: '+val : '📱 ntfy 알림 비활성화');
}

function toggleNtfySetting(){
  var p = document.getElementById('ntfy-panel');
  var inp = document.getElementById('ntfy-input');
  if(!p) return;
  var visible = p.style.display !== 'none';
  p.style.display = visible ? 'none' : 'flex';
  if(!visible && inp){ inp.value = localStorage.getItem('ntfy_topic')||''; inp.focus(); updatePushUI(); }
}

// ── n8n 피더 체크 동기화 ──────────────────────────────────
function postCheckToN8N(ck, checked){
  fetch(N8N_BASE+'/webhook/feeder-check', {
    method:'POST',
    headers:{'Content-Type':'application/json','ngrok-skip-browser-warning':'true'},
    body: JSON.stringify({ date:currentDate, shift:currentShift, ck:ck, checked:checked })
  }).catch(function(){});
}

function loadCheckedFromN8N(date, shift){
  fetch(N8N_BASE+'/webhook/feeder-check?date='+date+'&shift='+shift, {headers:{'ngrok-skip-browser-warning':'true'}})
    .then(function(r){ return r.json(); })
    .then(function(data){
      var items = data.items || {};
      var changed = false;
      Object.keys(items).forEach(function(ck){
        var serverChecked = !!(items[ck] && items[ck].checked);
        if(checkedItems[ck] !== serverChecked){ checkedItems[ck] = serverChecked; changed = true; }
      });
      if(changed){ saveChecked(); renderMain(); }
    })
    .catch(function(){});
}

function toggleCheck(ck){
  checkedItems[ck] = !checkedItems[ck];
  saveChecked();
  postCheckToN8N(ck, checkedItems[ck]);

  var row = document.getElementById('card-'+ck);
  var btn = row && row.querySelector('.check-btn');
  if(!row) return;
  if(checkedItems[ck]){
    row.classList.add('checked-row');
    btn.classList.add('checked');
    btn.innerHTML = '✅ 출고완료';
  } else {
    row.classList.remove('checked-row');
    btn.classList.remove('checked');
    btn.innerHTML = '☐ 출고완료';
  }

  // 완료 현황 업데이트
  var total = currentItems.length;
  var done = currentItems.filter(function(m){
    var mck = ((m.code||'')+'_'+(m.line||'')).replace(/[^a-zA-Z0-9_\-]/g,'_');
    return checkedItems[mck];
  }).length;
  var si = document.getElementById('status-info');
  var shiftLabel = currentShift==='am'?'오전 ☀️':'오후 🌙';
  si.innerHTML = '<span class="status-shift '+currentShift+'">'+shiftLabel+'</span>'
    +' · <span id="done-count">'+done+'/'+total+'</span> 출고';

  // 전체 완료 시 ntfy 전송
  if(total > 0 && done === total){
    var dateLabel = (parseInt(currentDate.slice(4,6)))+'/'+parseInt(currentDate.slice(6,8));
    sendNtfy('📦 출고 완료', dateLabel+' '+shiftLabel.replace(/[☀️🌙]/g,'').trim()+' 전체 출고 완료 ('+total+'종)');
    showToast('🎉 전체 출고 완료! 피드백 전송됨');
  }
}

// ── 날짜 유틸 ─────────────────────────────────────────────────
function todayStr(){
  var d = new Date();
  return d.getFullYear()
    + String(d.getMonth()+1).padStart(2,'0')
    + String(d.getDate()).padStart(2,'0');
}
function fmtDisplay(s){
  var d = new Date(s.slice(0,4)+'-'+s.slice(4,6)+'-'+s.slice(6,8));
  var days=['일','월','화','수','목','금','토'];
  return (parseInt(s.slice(4,6)))+'/'+(parseInt(s.slice(6,8)))+'('+days[d.getDay()]+')';
}

// ── 날짜 목록 로드 ────────────────────────────────────────────
function loadDates(){
  fetch('https://aitechn8n.ngrok.app/webhook/confirmed', {headers:{'ngrok-skip-browser-warning':'true'}})
    .then(function(r){ return r.json(); })
    .then(function(data){
      var dates = (data.dates || []).sort().reverse();
      var sel = document.getElementById('date-sel');
      var today = todayStr();

      // 날짜 옵션 빌드: 확정된 날짜 + 오늘 기본
      var allDates = dates.slice();
      if(allDates.indexOf(today) < 0) allDates.unshift(today);
      allDates.sort().reverse();

      sel.innerHTML = allDates.map(function(d){
        var label = fmtDisplay(d) + (d===today?' (오늘)':'');
        return '<option value="'+d+'"'+( d===today?' selected':'')+'>'+label+'</option>';
      }).join('');

      if(!currentDate) currentDate = today;
      loadData();
    })
    .catch(function(){
      // 서버 없으면 오늘 날짜만
      var today = todayStr();
      var sel = document.getElementById('date-sel');
      sel.innerHTML = '<option value="'+today+'">'+fmtDisplay(today)+' (오늘)</option>';
      currentDate = today;
      loadData();
    });
}

// ── 확정 데이터 로드 ──────────────────────────────────────────
function loadData(){
  if(!currentDate) currentDate = todayStr();
  document.getElementById('last-update').textContent = '갱신 중...';

  fetch('https://aitechn8n.ngrok.app/webhook/confirmed?date='+currentDate, {headers:{'ngrok-skip-browser-warning':'true'}})
    .then(function(r){ return r.json(); })
    .then(function(data){
      var sig = getConfirmSig(data);
      var isNew = lastConfirmSig !== '' && sig !== lastConfirmSig;
      lastConfirmSig = sig;
      confirmedData = data;
      renderMain();
      loadCheckedFromN8N(currentDate, currentShift);
      if(isNew) showNewConfirmNotif();
      var now = new Date();
      document.getElementById('last-update').textContent =
        now.getHours()+'시'+String(now.getMinutes()).padStart(2,'0')+'분 갱신';
    })
    .catch(function(){
      showToast('서버 연결 실패');
      document.getElementById('last-update').textContent = '연결 실패';
      document.getElementById('main').innerHTML =
        '<div class="empty-state"><div class="empty-icon">⚠️</div>'
        +'<div class="empty-msg">서버에 연결할 수 없습니다</div>'
        +'<div class="empty-sub">n8n 서버(aitechn8n.ngrok.app)가 실행 중인지 확인하세요</div></div>';
    });
}

// ── 날짜/시프트 변경 ──────────────────────────────────────────
function onDateChange(){
  currentDate = document.getElementById('date-sel').value;
  loadData();
}

function selectShift(sh){
  currentShift = sh;
  document.getElementById('btn-am').classList.toggle('active', sh==='am');
  document.getElementById('btn-pm').classList.toggle('active', sh==='pm');
  renderMain();
}

// ── 메인 렌더링 ───────────────────────────────────────────────
function renderMain(){
  var main = document.getElementById('main');
  var statusInfo = document.getElementById('status-info');

  // 시프트 버튼 상태
  document.getElementById('btn-am').classList.toggle('active', currentShift==='am');
  document.getElementById('btn-pm').classList.toggle('active', currentShift==='pm');

  if(!confirmedData){
    main.innerHTML = '<div class="loading">데이터 없음</div>';
    return;
  }

  var items = confirmedData[currentShift] || [];
  // 008 라인 제외
  items = items.filter(function(item){ return (item.line||'') !== '008'; });
  currentItems = items;

  var shiftLabel = currentShift==='am' ? '오전 ☀️' : '오후 🌙';
  var done = items.filter(function(m){
    var mck = ((m.code||'')+'_'+(m.line||'')).replace(/[^a-zA-Z0-9_\-]/g,'_');
    return checkedItems[mck];
  }).length;
  statusInfo.innerHTML = '<span class="status-shift '+currentShift+'">'+shiftLabel+'</span>'
    +' · <span id="done-count">'+done+'/'+items.length+'</span> 출고';

  if(!items.length){
    main.innerHTML = '<div class="empty-state">'
      +'<div class="empty-icon">'+(currentShift==='am'?'☀️':'🌙')+'</div>'
      +'<div class="empty-msg">'+shiftLabel+' 확정된 자재 없음</div>'
      +'<div class="empty-sub">반장이 mrp_calculator에서 확정해주세요</div>'
      +'</div>';
    return;
  }

  var html = '<div class="mat-list">';
  items.forEach(function(m, i){
    var ck = ((m.code||'')+'_'+(m.line||'')).replace(/[^a-zA-Z0-9_\-]/g,'_');
    var isChecked = checkedItems[ck];
    var pq = m.pack_qty || 0;
    var bc = m.box_count || 0;
    html += '<div class="mat-card '+(isChecked?'checked-row ':'')+currentShift+'" id="card-'+ck+'">'
      +'<div class="mat-card-header">'
        +'<div class="mat-card-num">'+(i+1)+'</div>'
        +'<div class="mat-card-info">'
          +'<div class="mat-card-meta">'+esc(m.code||'')+'</div>'
          +'<div class="mat-card-name">'+esc(m.name||'')+(m.remark?'<span style="color:#94a3b8"> · '+esc(m.remark)+'</span>':'')+(m.unit?' <span style="color:#94a3b8;font-size:11px">'+esc(m.unit)+'</span>':'')+'</div>'
        +'</div>'
      +'</div>'
      +'<div class="mat-card-bottom">'
        +'<div class="mat-card-left">'
          +'<div class="mat-card-stats">'
            +'<div class="mat-stat"><div class="mat-stat-label">필요소요량</div><div class="mat-stat-value">'+fmtQty(m.qty)+'</div></div>'
            +'<div class="mat-stat"><div class="mat-stat-label">BOX적입량</div><div class="mat-stat-value">'+(pq>0?fmtQty(pq):'-')+'</div></div>'
            +'<div class="mat-stat"><div class="mat-stat-label">박스수</div><div class="mat-stat-value">'+(bc>0?bc:'-')+'</div></div>'
            +'<div class="mat-stat"><div class="mat-stat-label">적재위치</div><div class="mat-stat-value">'+(m.location?esc(m.location):'-')+'</div></div>'
          +'</div>'
        +'</div>'
        +'<button class="check-btn'+(isChecked?' checked':'')+'" onclick="toggleCheck(\''+ck+'\')">'
          +'<span style="font-size:18px">'+(isChecked?'✅':'☐')+'</span>'
          +'<span>'+(isChecked?'완료':'출고')+'</span>'
        +'</button>'
      +'</div>'
    +'</div>';
  });
  html += '</div>';

  // 하단 여백 (status-bar 가림 방지)
  html += '<div style="height:60px"></div>';
  main.innerHTML = html;
}

// ── 라인 접기/펼치기 ──────────────────────────────────────────
function toggleLine(id){
  var body = document.getElementById(id);
  var idx = id.replace('line-','');
  var toggle = document.getElementById('toggle-'+idx);
  if(!body) return;
  var collapsed = body.style.display === 'none';
  body.style.display = collapsed ? '' : 'none';
  toggle.classList.toggle('collapsed', !collapsed);
}

// ── 유틸 ──────────────────────────────────────────────────────
function fmtQty(n){
  var v = parseFloat(n) || 0;
  return (v%1===0) ? Number(v).toLocaleString() : Number(v).toFixed(2);
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

// ── 🔔 알림 (폴링 감지 방식) ─────────────────────────────────
var lastConfirmSig = '';

function isNotifSupported(){ return 'Notification' in window; }

function getConfirmSig(data){
  if(!data) return '';
  var am=(data.am||[]).length, pm=(data.pm||[]).length;
  var fc=(data.am&&data.am[0]&&data.am[0].code)||'';
  return am+'_'+pm+'_'+fc;
}

function updatePushUI(){
  var btn=document.getElementById('pushToggleBtn');
  var txt=document.getElementById('pushStatusTxt');
  if(!isNotifSupported()){
    if(btn) btn.style.display='none';
    if(txt) txt.textContent='이 브라우저는 알림 미지원';
    return;
  }
  var perm=Notification.permission;
  if(perm==='granted'){
    if(btn){btn.textContent='✅ 알림 켜짐';btn.style.background='#166534';btn.disabled=true;}
    if(txt) txt.textContent='확정 감지 시 자동으로 알림';
  } else if(perm==='denied'){
    if(btn) btn.style.display='none';
    if(txt) txt.textContent='❌ 알림 차단됨 — 브라우저 설정에서 허용';
  } else {
    if(btn){btn.textContent='🔔 알림 허용';btn.style.background='#1e3a8a';btn.disabled=false;}
    if(txt) txt.textContent='알림 꺼짐';
  }
}

function handlePushToggle(){
  if(!isNotifSupported()) return;
  if(Notification.permission==='granted'){ updatePushUI(); return; }
  Notification.requestPermission().then(function(perm){
    var msg=document.getElementById('pushMsg');
    if(perm==='granted'){
      if('serviceWorker' in navigator){
        var sp=location.hostname==='aitmt6471.github.io'?'/workorder/sw.js':'/sw.js';
        var sc=location.hostname==='aitmt6471.github.io'?'/workorder/':'/';
        navigator.serviceWorker.register(sp,{scope:sc}).catch(function(){});
      }
      if(msg){msg.style.color='#16a34a';msg.textContent='✅ 이제 확정 시 자동 알림이 옵니다!';}
    } else {
      if(msg){msg.style.color='#dc2626';msg.textContent='❌ 알림 권한이 거부되었습니다.';}
    }
    updatePushUI();
  });
}

function showNewConfirmNotif(){
  if(!isNotifSupported()||Notification.permission!=='granted') return;
  var am=confirmedData&&confirmedData.am?confirmedData.am.length:0;
  var pm=confirmedData&&confirmedData.pm?confirmedData.pm.length:0;
  var dl=currentDate?(parseInt(currentDate.slice(4,6)))+'/'+parseInt(currentDate.slice(6,8)):'오늘';
  var opts={body:dl+' 확정 — AM: '+am+'종 / PM: '+pm+'종\n피더뷰를 확인하세요',icon:'ait-logo.png',badge:'ait-logo.png',tag:'ait-mrp',renotify:true};
  if('serviceWorker' in navigator){
    navigator.serviceWorker.ready.then(function(reg){ reg.showNotification('📦 새 자재 출고 확정',opts); }).catch(function(){ new Notification('📦 새 자재 출고 확정',opts); });
  } else { new Notification('📦 새 자재 출고 확정',opts); }
}

// ── 초기화 + 자동 갱신 ───────────────────────────────────────
loadChecked();
selectShift('am');
loadDates();
setInterval(loadData, 60 * 1000); // 1분 자동갱신
</script>
