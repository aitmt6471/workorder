<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>자재 출고 요청서</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="출고요청서">
<link rel="manifest" href="feeder-manifest.json">
<link rel="apple-touch-icon" href="ait-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── AIT 브랜드: 네이비 #1a3472 · 레드 #c8102e ── */
:root{--navy:#1a3472;--red:#c8102e;--bg:#fff;--surface:#fff;--border:#cdd5e4;--text:#1a2540}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);font-size:14px;-webkit-tap-highlight-color:transparent}

/* ── 타임 탭 ── */
.time-tabs{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin:8px 0 10px}
.time-tab{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:10px 4px;border-radius:12px;border:2px solid #e2e8f0;background:#fff;cursor:pointer;transition:.15s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.time-tab:active{transform:scale(.94)}
.time-tab.active{border-color:var(--tab-border);background:var(--tab-bg)}
.time-tab.slot-all-done{border-color:#22c55e!important;background:#f0fdf4!important}
.time-tab-label{font-size:13px;font-weight:800;color:#94a3b8;line-height:1}
.time-tab.active .time-tab-label{color:var(--tab-color)}
.time-tab.slot-all-done .time-tab-label{color:#15803d!important}
.time-tab-badge{font-size:11px;font-weight:700;color:#94a3b8;background:#f1f5f9;padding:2px 7px;border-radius:8px;line-height:1.4}
.time-tab.active .time-tab-badge{background:rgba(0,0,0,.07);color:var(--tab-color)}
.time-tab-badge.bdone{background:#dcfce7!important;color:#15803d!important}

/* 블롭 배경 제거 — 깔끔한 단색 배경 */
.bg-blobs{display:none}

/* ── 헤더: AIT 네이비 ── */
.header{background:#fff;color:var(--navy);padding:13px 18px;position:sticky;top:0;z-index:100;text-align:center;box-shadow:0 2px 8px rgba(26,52,114,.12);border-bottom:1px solid var(--border)}
.header::after{display:none}
.header-brand{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:5px}
.header-title{font-size:17px;font-weight:800;letter-spacing:-.02em;color:var(--navy)}
.refresh-btn{background:#f1f5f9;border:1px solid var(--border);color:var(--navy);border-radius:50%;width:34px;height:34px;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0}
.refresh-btn:active{background:#e2e8f0;transform:rotate(30deg)}
.last-update{font-size:11px;color:#94a3b8;margin-bottom:8px}

/* ── 컨트롤 ── */
.controls{display:flex;gap:8px;align-items:center}
.date-select{flex:1;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;background:#fff;color:var(--text);font-size:14px;font-family:inherit;-webkit-appearance:none;transition:.2s}
.date-select:focus{border-color:var(--navy);outline:none}
.date-select option{color:#1a1a1a;background:#fff}

.main{padding:6px 6px}

/* ── 라인 필터 버튼 ── */
.lf-row{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:8px 0 4px;flex-wrap:nowrap}
.lf-row::-webkit-scrollbar{display:none}
.lf-btn{padding:7px 14px;border:1.5px solid var(--border);border-radius:14px;background:#fff;color:#475569;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:.15s;-webkit-tap-highlight-color:transparent}
.lf-btn:active{transform:scale(.95)}
.lf-btn.active{background:var(--navy);border-color:var(--navy);color:#fff;box-shadow:0 2px 8px rgba(26,52,114,.25)}
.lf-btn.myline{border-color:var(--red);color:var(--red)}
.lf-btn.active.myline{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 2px 8px rgba(200,16,46,.25)}

/* ── 상태/로딩 ── */
.empty-state{background:#fff;border-radius:14px;padding:40px 20px;text-align:center;color:#94a3b8;border:1.5px solid var(--border)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-msg{font-size:14px;line-height:1.5;color:#64748b}
.empty-sub{font-size:12px;margin-top:6px;color:#94a3b8}
.loading{background:#fff;border-radius:14px;padding:40px;text-align:center;color:#94a3b8;font-size:14px;border:1.5px solid var(--border)}

/* ── 토스트 ── */
.toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:11px 22px;border-radius:14px;font-size:13px;z-index:9999;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;box-shadow:0 6px 20px rgba(26,52,114,.35)}
.toast.show{opacity:1}

/* ── 상태바 ── */
.status-bar{position:fixed;bottom:0;left:0;right:0;background:var(--navy);border-top:none;padding:9px 18px;display:flex;align-items:center;justify-content:space-between;font-size:12px;color:rgba(255,255,255,.8);box-shadow:0 -2px 10px rgba(26,52,114,.25)}
.status-shift.am{color:#fca5a5;font-weight:700}
.status-shift.pm{color:#93c5fd;font-weight:700}
.auto-badge{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.2);padding:3px 10px;border-radius:8px;font-size:11px;font-weight:600}

/* ── 기존 카드/라인 CSS (레거시) ── */
.line-section{margin-bottom:16px}
.line-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--navy);color:#fff;border-radius:12px 12px 0 0;cursor:pointer;user-select:none}
.line-header-left{display:flex;align-items:center;gap:8px}
.line-name{font-size:15px;font-weight:800}
.line-count{font-size:11px;color:rgba(255,255,255,.7)}
.line-toggle{font-size:14px;transition:.2s}
.line-toggle.collapsed{transform:rotate(-90deg)}
.line-body{border:1.5px solid var(--border);border-top:none;border-radius:0 0 12px 12px;overflow:hidden}
.check-btn{width:52px;min-width:52px;padding:8px 4px;border:2px solid var(--border);border-radius:10px;background:#fff;color:#64748b;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;transition:.2s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;-webkit-tap-highlight-color:transparent}
.check-btn.checked{border-color:var(--navy);background:var(--navy);color:#fff}
.fcard{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px;border:1.5px solid var(--border)}
.fsec-header{display:flex;align-items:center;justify-content:space-between;padding:10px 2px 6px}
.fsec-title{font-size:14px;font-weight:800;color:var(--navy)}
.fsec-count{font-size:12px;font-weight:600;color:#64748b;background:var(--bg);padding:2px 8px;border-radius:8px}
.fsec-header.alldone .fsec-title{color:#166534}
.fsec-header.alldone .fsec-count{background:#dcfce7;color:#166534}

@media print{
  .header,.status-bar,.toast,.bg-blobs{display:none!important}
  .line-body{display:block!important}
  .mat-qty{font-size:36px}
  body{background:#fff}
  .check-btn{display:none!important}
}
@media(min-width:480px){
  .mat-qty{font-size:56px}
}
</style>
</head>
<body>

<div class="bg-blobs" aria-hidden="true">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<!-- ── 공통 헤더 ── -->
<div class="header">
  <div class="header-brand">
    <img src="ait-logo.png" alt="AIT" style="height:38px;width:auto;object-fit:contain">
    <div class="header-title">자재 출고 요청서</div>
    <button onclick="toggleNtfySetting()" title="푸시 알림 설정" style="background:none;border:none;font-size:18px;cursor:pointer;padding:2px 4px;color:#6b7280;flex-shrink:0">⚙️</button>
  </div>
  <div id="ntfy-panel" style="display:none;padding:8px 4px 4px;flex-direction:column;gap:8px">
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:center">
      <span style="font-size:12px;color:#6b7280;white-space:nowrap">📱 ntfy 토픽</span>
      <input id="ntfy-input" type="text" placeholder="예: ait-mrp-1234"
        style="flex:1;min-width:140px;max-width:220px;padding:6px 10px;border:1px solid #d1d5db;border-radius:10px;font-size:13px;font-family:inherit">
      <button onclick="saveNtfyTopic()"
        style="padding:6px 14px;border:none;border-radius:10px;background:#1e3a8a;color:#fff;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap">저장</button>
    </div>
    <div style="border-top:1px solid #e5e7eb;padding-top:8px;display:flex;align-items:center;justify-content:space-between;gap:8px">
      <div>
        <div id="pushStatusTxt" style="font-size:12px;font-weight:600;color:#374151">확인 중...</div>
        <div style="font-size:11px;color:#6b7280">확정 시 즉시 푸시 알림</div>
      </div>
      <button id="pushToggleBtn" onclick="handlePushToggle()"
        style="flex-shrink:0;padding:7px 14px;border-radius:10px;border:none;font-size:12px;font-weight:700;cursor:pointer;background:#1e3a8a;color:#fff;white-space:nowrap;font-family:inherit">🔔 알림 허용</button>
    </div>
    <div id="pushMsg" style="font-size:11px;text-align:center"></div>
    <div id="iosGuide" style="display:none;font-size:11px;color:#f97316;text-align:center;line-height:1.5">
      iOS Safari에서 홈 화면에 추가 후 사용하세요.<br><b>공유 → 홈 화면에 추가</b>
    </div>
  </div>
</div>

<!-- ── 전체 자재 뷰 ── -->
<div id="full-view" style="padding-bottom:80px">
  <div style="padding:8px 14px">
    <div class="last-update" id="last-update">로딩 중...</div>
    <div class="controls" style="justify-content:center;flex-wrap:nowrap;gap:4px">
      <!-- B안: 년/월/일 3단 드롭다운 -->
      <select id="year-sel" onchange="onDateSelChange()" style="padding:9px 6px;border:1.5px solid var(--border);border-radius:10px;background:#fff;color:var(--navy);font-size:14px;font-weight:700;font-family:inherit;outline:none;flex-shrink:0;cursor:pointer;-webkit-appearance:none;text-align:center">
        <option>2024</option>
        <option>2025</option>
        <option>2026</option>
        <option>2027</option>
      </select>
      <select id="month-sel" onchange="onMonthSelChange()" style="padding:9px 6px;border:1.5px solid var(--border);border-radius:10px;background:#fff;color:var(--navy);font-size:14px;font-weight:700;font-family:inherit;outline:none;flex-shrink:0;cursor:pointer;-webkit-appearance:none;text-align:center">
        <option value="01">01월</option><option value="02">02월</option><option value="03">03월</option>
        <option value="04">04월</option><option value="05">05월</option><option value="06">06월</option>
        <option value="07">07월</option><option value="08">08월</option><option value="09">09월</option>
        <option value="10">10월</option><option value="11">11월</option><option value="12">12월</option>
      </select>
      <select id="day-sel" onchange="onDateSelChange()" style="padding:9px 6px;border:1.5px solid var(--border);border-radius:10px;background:#fff;color:var(--navy);font-size:14px;font-weight:700;font-family:inherit;outline:none;flex-shrink:0;cursor:pointer;-webkit-appearance:none;text-align:center">
      </select>
      <button class="refresh-btn" onclick="loadData()" title="새로고침">&#x21bb;</button>
    </div>
    <div class="lf-row" id="line-filter-row">
      <button class="lf-btn active" onclick="setFilterLine('전체')">전체</button>
    </div>
  </div>
  <div class="main" id="main">
    <div class="loading">데이터 불러오는 중...</div>
  </div>
</div>


<div class="status-bar">
  <span id="status-info">반장이 확정한 자재 목록</span>
  <span class="auto-badge">1분 자동갱신</span>
</div>

<div class="toast" id="toast"></div>

<script>
var currentShift = 'all';
var currentDate = '';
var confirmedData = null;
var checkedItems = {};
var currentFilterLine = '전체';
var currentTimeSlot = 'a';
var myLines = JSON.parse(localStorage.getItem('feeder_my_lines')||'[]');
var lineAssignments = JSON.parse(localStorage.getItem('feeder_line_assignments')||'{}');
var _allAvailLines = [];

function setTimeSlot(sh){ currentTimeSlot = sh; renderMain(); }

var N8N_BASE = 'https://aitechn8n.ngrok.app';
var NTFY_TOPIC = localStorage.getItem('ntfy_topic') || '';
var currentItems = [];

function checkedKey(){ return 'mrp_feeder_checked_'+(currentDate||'none'); }
function saveChecked(){
  try{ localStorage.setItem(checkedKey(), JSON.stringify(checkedItems)); }catch(e){}
}
function loadChecked(){
  try{ checkedItems = JSON.parse(localStorage.getItem(checkedKey())||'{}'); }catch(e){ checkedItems={}; }
}

// ── ntfy 푸시 알림 ────────────────────────────────────────
function sendNtfy(title, body){
  var topic = localStorage.getItem('ntfy_topic') || '';
  if(!topic) return;
  fetch('https://ntfy.sh/'+encodeURIComponent(topic), {
    method:'POST',
    body: body,
    headers:{
      'Title': title,
      'Priority': 'high',
      'Tags': 'package',
      'Content-Type': 'text/plain; charset=utf-8'
    }
  }).catch(function(){});
}

function saveNtfyTopic(){
  var val = (document.getElementById('ntfy-input')||{}).value || '';
  val = val.trim();
  localStorage.setItem('ntfy_topic', val);
  NTFY_TOPIC = val;
  document.getElementById('ntfy-panel').style.display = 'none';
  showToast(val ? '📱 ntfy 토픽 저장: '+val : '📱 ntfy 알림 비활성화');
}

function toggleNtfySetting(){
  var p = document.getElementById('ntfy-panel');
  var inp = document.getElementById('ntfy-input');
  if(!p) return;
  var visible = p.style.display !== 'none';
  p.style.display = visible ? 'none' : 'flex';
  if(!visible && inp){ inp.value = localStorage.getItem('ntfy_topic')||''; inp.focus(); updatePushUI(); }
}

// ── n8n 피더 체크 동기화 ──────────────────────────────────
function postCheckToN8N(ck, checked){
  fetch(N8N_BASE+'/webhook/feeder-check', {
    method:'POST',
    headers:{'Content-Type':'application/json','ngrok-skip-browser-warning':'true'},
    body: JSON.stringify({ date:currentDate, shift:currentShift, ck:ck, checked:checked })
  }).catch(function(){});
}

function loadCheckedFromN8N(date, shift){
  fetch(N8N_BASE+'/webhook/feeder-check?date='+date+'&shift='+shift, {headers:{'ngrok-skip-browser-warning':'true'}})
    .then(function(r){ return r.json(); })
    .then(function(data){
      var items = data.items || {};
      var changed = false;
      Object.keys(items).forEach(function(ck){
        var serverChecked = !!(items[ck] && items[ck].checked);
        if(checkedItems[ck] !== serverChecked){ checkedItems[ck] = serverChecked; changed = true; }
      });
      if(changed){ saveChecked(); renderMain(); }
    })
    .catch(function(){});
}

function toggleCheck(ck){
  checkedItems[ck] = !checkedItems[ck];
  saveChecked();
  postCheckToN8N(ck, checkedItems[ck]);

  // 완료 여부 렌더 전에 계산
  var total = currentItems.length;
  var done = currentItems.filter(function(m){
    var mck = ((m.code||'')+'_'+(m.line_name||m.line||'')+'_'+(m._slot||'')).replace(/[^a-zA-Z0-9_\-]/g,'_');
    return checkedItems[mck];
  }).length;

  renderMain();

  // 전체 완료 시 ntfy 전송
  if(total > 0 && done === total){
    var dateLabel = (parseInt(currentDate.slice(4,6)))+'/'+parseInt(currentDate.slice(6,8));
    var _tcLabels={all:'전체',am:'오전',a:'A타임',b:'B타임',pm:'오후',c:'C타임',d:'D타임'};
    var shiftLabel = _tcLabels[currentShift]||currentShift;
    sendNtfy('📦 출고 완료', dateLabel+' '+shiftLabel+' 전체 출고 완료 ('+total+'건)');
    showToast('🎉 전체 출고 완료! 피드백 전송됨');
  }
}

// ── 날짜 유틸 ─────────────────────────────────────────────────
function todayStr(){
  var d = new Date();
  return d.getFullYear()
    + String(d.getMonth()+1).padStart(2,'0')
    + String(d.getDate()).padStart(2,'0');
}
// ── 일(day) 옵션 생성 (월에 맞는 일수) ──────────────────────
function buildDayOptions(year, month){
  var ds = document.getElementById('day-sel');
  if(!ds) return;
  var prevDay = ds.value;
  var daysInMonth = new Date(parseInt(year), parseInt(month), 0).getDate();
  var html = '';
  for(var i=1; i<=daysInMonth; i++){
    var v = String(i).padStart(2,'0');
    html += '<option value="'+v+'">'+v+'일</option>';
  }
  ds.innerHTML = html;
  // 이전 선택일 유지 (범위 내에서)
  if(prevDay && parseInt(prevDay) <= daysInMonth) ds.value = prevDay;
}

// ── 월 변경 시 일 옵션 재구성 후 날짜 적용 ───────────────────
function onMonthSelChange(){
  var ys = document.getElementById('year-sel');
  var ms = document.getElementById('month-sel');
  if(!ys||!ms) return;
  buildDayOptions(ys.value, ms.value);
  onDateSelChange();
}

// ── 년/월/일 셀렉트 → currentDate 갱신 ──────────────────────
function onDateSelChange(){
  var ys = document.getElementById('year-sel');
  var ms = document.getElementById('month-sel');
  var ds = document.getElementById('day-sel');
  if(!ys||!ms||!ds||!ds.value) return;
  currentDate = ys.value + ms.value + ds.value;
  loadChecked();
  loadData();
}

// ── 날짜 초기화: 오늘로 설정 ──────────────────────────────────
function loadDates(){
  var today = todayStr();
  var yy = today.slice(0,4), mm = today.slice(4,6), dd = today.slice(6,8);
  var ys = document.getElementById('year-sel');
  var ms = document.getElementById('month-sel');
  if(ys) ys.value = yy;
  if(ms) ms.value = mm;
  buildDayOptions(yy, mm);
  var ds = document.getElementById('day-sel');
  if(ds) ds.value = dd;
  if(!currentDate) currentDate = today;
  loadData();
}

// ── 확정 데이터 로드 ──────────────────────────────────────────
function loadData(){
  if(!currentDate) currentDate = todayStr();
  document.getElementById('last-update').textContent = '갱신 중...';
  document.getElementById('main').innerHTML = '<div class="loading">데이터 불러오는 중...</div>';

  fetch('https://aitechn8n.ngrok.app/webhook/confirmed?date='+currentDate, {headers:{'ngrok-skip-browser-warning':'true'}})
    .then(function(r){
      if(!r.ok) throw new Error('HTTP '+r.status);
      return r.text();
    })
    .then(function(text){
      var data = {};
      try { data = JSON.parse(text); } catch(e){ throw new Error('응답 형식 오류'); }
      // a/b/c/d 키 보정: 없으면 am/pm 데이터로 채움
      if(!data.a && data.am) data.a = data.am;
      if(!data.b) data.b = [];
      if(!data.c && data.pm) data.c = data.pm;
      if(!data.d) data.d = [];
      ['a','b','c','d','am','pm'].forEach(function(k){ if(!Array.isArray(data[k])) data[k]=[]; });
      var sig = getConfirmSig(data);
      var isNew = lastConfirmSig !== '' && sig !== lastConfirmSig;
      lastConfirmSig = sig;
      confirmedData = data;
      try { renderMain(); } catch(e){
        document.getElementById('main').innerHTML =
          '<div class="empty-state"><div class="empty-icon">⚠️</div>'
          +'<div class="empty-msg">화면 렌더링 오류</div>'
          +'<div class="empty-sub">'+String(e)+'</div></div>';
        console.error('[renderMain 오류]', e);
      }
      loadCheckedFromN8N(currentDate, currentShift);
      enrichVendors();
      if(isNew) showNewConfirmNotif();
      var now = new Date();
      document.getElementById('last-update').textContent =
        now.getHours()+'시'+String(now.getMinutes()).padStart(2,'0')+'분 갱신';
    })
    .catch(function(e){
      showToast('서버 연결 실패: '+String(e));
      document.getElementById('last-update').textContent = '연결 실패';
      document.getElementById('main').innerHTML =

function enrichVendors(){
  var codes=[];
  ['a','b','c','d'].forEach(function(sh){
    (confirmedData[sh]||[]).forEach(function(m){
      if(m.code&&codes.indexOf(m.code)===-1) codes.push(m.code);
    });
  });
  if(!codes.length) return;
  fetch('https://aitechn8n.ngrok.app/webhook/vendor-lookup',{
    method:'POST',
    headers:{'Content-Type':'application/json','ngrok-skip-browser-warning':'true'},
    body:JSON.stringify({codes:codes})
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    var vendors=data.vendors||{};
    if(!Object.keys(vendors).length) return;
    ['a','b','c','d'].forEach(function(sh){
      (confirmedData[sh]||[]).forEach(function(m){
        if(vendors[m.code]) m.vendor=vendors[m.code];
      });
    });
    try{ renderMain(); }catch(e){}
  })
  .catch(function(e){ console.warn('[vendor-lookup] 실패:',e); });
}

function selectShift(sh){
  currentShift = sh;
  var elAll = document.getElementById('shift-all');
  var elAm  = document.getElementById('shift-am');
  var elPm  = document.getElementById('shift-pm');
  if(elAll){ elAll.classList.remove('active','all'); }
  if(elAm){  elAm.classList.remove('active','am');  }
  if(elPm){  elPm.classList.remove('active','pm');  }
  if(sh==='all'){ if(elAll) elAll.classList.add('active','all'); }
  else if(sh==='am'||sh==='a'||sh==='b'){ if(elAm) elAm.classList.add('active','am'); }
  else { if(elPm) elPm.classList.add('active','pm'); }
  renderMain();
}

// ── 라인 필터 ────────────────────────────────────────────────
function setFilterLine(ln){
  currentFilterLine = ln;
  updateLineFilterRow();
  renderMain();
}

// ── 라인 필터 버튼 행 갱신 ───────────────────────────────────
function updateLineFilterRow(){
  var row = document.getElementById('line-filter-row');
  if(!row) return;
  var html = '<button class="lf-btn'+(currentFilterLine==='전체'?' active':'')+'" onclick="setFilterLine(\'전체\')">전체</button>';
  _allAvailLines.forEach(function(ln){

    var isActive = currentFilterLine===ln;
    html += '<button class="lf-btn'+(isActive?' active':'')+(isMy?' myline':'')+'" onclick="setFilterLine(\''+ln.replace(/'/g,"\\'")+'\')">'+esc(ln)+'</button>';

// ── 내 담당 라인 토글/저장 ────────────────────────────────────
function toggleMyLine(ln){
  var idx = myLines.indexOf(ln);
  if(idx===-1) myLines.push(ln);
  else myLines.splice(idx,1);
  localStorage.setItem('feeder_my_lines', JSON.stringify(myLines));
  renderMyLinesChips();
  updateLineFilterRow();
  // 내 라인 설정 시 자동 필터 적용
  if(myLines.length===1) setFilterLine(myLines[0]);
  else if(myLines.length===0) setFilterLine('전체');
}

function renderMyLinesChips(){
  var el = document.getElementById('my-lines-chips');
  if(!el) return;
  if(!_allAvailLines.length){
    el.innerHTML = '<span style="font-size:11px;color:#9ca3af">날짜 선택 후 라인이 표시됩니다</span>';
    return;
  }
  el.innerHTML = _allAvailLines.map(function(ln){
    var on = myLines.indexOf(ln)!==-1;
    return '<button onclick="toggleMyLine(\''+ln.replace(/'/g,"\\'")+'\')"\n'
      +'style="padding:6px 14px;border:2px solid '+(on?'#f59e0b':'#e5e7eb')+';border-radius:16px;'
      +'background:'+(on?'#fef3c7':'#fff')+';color:'+(on?'#92400e':'#374151')+';'
      +'font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent">'
      +(on?'✓ ':'')+esc(ln)+'</button>';
  }).join('');
}

// ── 라인별 담당자 관리 ────────────────────────────────────────

function renderLineAssignRows(){
  var el = document.getElementById('line-assign-rows');
  if(!el) return;
  if(!_allAvailLines.length){
    el.innerHTML = '<span style="font-size:11px;color:#9ca3af">날짜 선택 후 라인이 표시됩니다</span>';
    return;
  }
  el.innerHTML = _allAvailLines.map(function(ln){

    return '<div style="display:flex;align-items:center;gap:6px">'

function saveLineAssignments(){
  var rows = document.querySelectorAll('#line-assign-rows input[data-line]');
  var obj = {};
  rows.forEach(function(input){
    var ln = input.getAttribute('data-line');
    var name = input.value.trim();
    if(name) obj[ln] = name;
  });
  lineAssignments = obj;
  localStorage.setItem('feeder_line_assignments', JSON.stringify(obj));
  populateMyPersonSel();
  showToast('담당자 저장 완료');
}

function populateMyPersonSel(){
  var sel = document.getElementById('my-person-sel');
  if(!sel) return;
  var people = [];
  Object.keys(lineAssignments).forEach(function(ln){
    var name = lineAssignments[ln];
    if(name && people.indexOf(name)===-1) people.push(name);
  });
  people.sort();
  var cur = localStorage.getItem('feeder_my_person') || '';
  var opts = '<option value="">-- 선택 안 함 (전체 표시) --</option>';
  people.forEach(function(p){
    opts += '<option value="'+esc(p)+'"'+(p===cur?' selected':'')+'>'+esc(p)+'</option>';
  });
  sel.innerHTML = opts;
}

function applyMyPerson(){
  var sel = document.getElementById('my-person-sel');
  var person = sel ? sel.value : '';
  localStorage.setItem('feeder_my_person', person);
  if(!person){
    myLines = [];
    localStorage.setItem('feeder_my_lines', '[]');
    currentFilterLine = '전체';
  } else {
    var assigned = [];
    Object.keys(lineAssignments).forEach(function(ln){
      if(lineAssignments[ln] === person) assigned.push(ln);
    });
    myLines = assigned;
    localStorage.setItem('feeder_my_lines', JSON.stringify(myLines));
    currentFilterLine = (myLines.length === 1) ? myLines[0] : '전체';
  }
  updateLineFilterRow();
  renderMain();
}

// ── 메인 렌더링 ───────────────────────────────────────────────
function renderMain(){
  var main = document.getElementById('main');
  var statusInfo = document.getElementById('status-info');

  if(!confirmedData){
    main.innerHTML = '<div class="loading">데이터 없음</div>';
    return;
  }

  // 타임별 아이템 수집 (008 제외)
  var slotItems = {};
  ['a','b','c','d'].forEach(function(sh){
    slotItems[sh] = (confirmedData[sh]||[]).filter(function(item){ return (item.line||'') !== '008'; });
  });

  // 유일 라인명 수집
  var allLines = [];
  ['a','b','c','d'].forEach(function(sh){
    slotItems[sh].forEach(function(m){
      var lns = (m.lines && Object.keys(m.lines).length) ? Object.keys(m.lines) : [m.line_name||''];
      lns.forEach(function(ln){ if(ln && allLines.indexOf(ln)===-1) allLines.push(ln); });
    });
  });
  allLines.sort();
  _allAvailLines = allLines;
  updateLineFilterRow();
  renderMyLinesChips();
  renderLineAssignRows();
  populateMyPersonSel();

  // ── 타임탭 헬퍼 ──────────────────────────────────────────────
  var slotLabels = {a:'A타임', b:'B타임', c:'C타임', d:'D타임'};
  var slotCfg = {
    a:{bg:'#fef9ec', border:'#f59e0b', color:'#92400e'},
    b:{bg:'#fff4ee', border:'#fb923c', color:'#9a3412'},
    c:{bg:'#eff6ff', border:'#60a5fa', color:'#1e3a8a'},
    d:{bg:'#f5f3ff', border:'#a78bfa', color:'#5b21b6'}
  };

  // 특정 슬롯+라인필터의 (count, done) 계산
  function slotStat(sh){
    var count=0, done=0;
    slotItems[sh].forEach(function(m){
      var lns = (m.lines && Object.keys(m.lines).length) ? Object.keys(m.lines) : [m.line_name||m.line||''];
      var target = currentFilterLine==='전체' ? lns : lns.filter(function(ln){ return ln===currentFilterLine; });
      target.forEach(function(ln){
        count++;
        var ck = ((m.code||'')+'_'+ln+'_'+sh).replace(/[^a-zA-Z0-9_\-]/g,'_');
        if(checkedItems[ck]) done++;
      });
    });
    return {count:count, done:done};
  }

  // ── 타임 탭 HTML ─────────────────────────────────────────────
  var tabsHtml = '<div class="time-tabs">';
  ['a','b','c','d'].forEach(function(sh){
    var st = slotStat(sh);
    var cfg = slotCfg[sh];
    var isActive = currentTimeSlot === sh;
    var allDone = st.count > 0 && st.done === st.count;
    var cls = 'time-tab' + (isActive?' active':'') + (allDone?' slot-all-done':'');
    var style = isActive ? ('--tab-bg:'+cfg.bg+';--tab-border:'+cfg.border+';--tab-color:'+cfg.color) : '';
    tabsHtml += '<button class="'+cls+'" style="'+style+'" onclick="setTimeSlot(\''+sh+'\')">'
      +'<span class="time-tab-label">'+slotLabels[sh]+'</span>'
      +'<span class="time-tab-badge'+(allDone?' bdone':'')+'">'+(st.count?st.done+'/'+st.count:'—')+'</span>'
      +'</button>';
  });
  tabsHtml += '</div>';

  // ── 현재 슬롯 아이템 → 라인별 그룹핑 ────────────────────────
  var lineGroups={}, lineOrder=[];
  slotItems[currentTimeSlot].forEach(function(m){
    var code = m.code||'(미상)';
    var lnKeys = (m.lines && Object.keys(m.lines).length) ? Object.keys(m.lines) : [m.line_name||m.line||'미지정'];
    lnKeys.forEach(function(ln){
      if(currentFilterLine!=='전체' && ln!==currentFilterLine) return;
      if(!lineGroups[ln]){ lineGroups[ln]={line_name:ln,line:ln,items:[]}; lineOrder.push(ln); }
      var lineQty = (m.lines && m.lines[ln]!==undefined) ? m.lines[ln] : m.qty;
      var pq = m.pack_qty||0;
      lineGroups[ln].items.push(Object.assign({},m,{
        qty: lineQty,
        box_count: pq>0 ? Math.ceil(lineQty/pq) : (m.box_count||0),
        _ln: ln
      }));
    });
  });

  // currentItems + 상태바 갱신
  currentItems=[];
  lineOrder.forEach(function(ln){ lineGroups[ln].items.forEach(function(m){ currentItems.push(Object.assign({},m,{_slot:currentTimeSlot})); }); });
  var total=currentItems.length;
  var done=currentItems.filter(function(m){
    var ck=((m.code||'')+'_'+(m._ln||'')+'_'+currentTimeSlot).replace(/[^a-zA-Z0-9_\-]/g,'_');
    return checkedItems[ck];
  }).length;
  statusInfo.innerHTML=(currentFilterLine!=='전체'?esc(currentFilterLine)+' · ':'')
    +slotLabels[currentTimeSlot]+' <span id="done-count">'+done+'/'+total+'</span> 완료';

  // ── 테이블 빌드: No | 위치 | 품번/품명 | 수량 | 박스 | 잔 | 출고 ──
  function buildTable(){
    if(!lineOrder.length) return '';
    // 8컬럼: No(18) 위치(36) 품번/품명(auto) 소요량(40) 적입(34) 잔(32) 박스(34) 출고(44)
    var TH='font-size:10px;color:#64748b;font-weight:700;text-align:center;border-right:1px solid #e2e8f0;padding:5px 2px;';
    var colHeader='<tr style="background:#f1f5f9">'
      +'<th style="'+TH+'">No</th>'
      +'<th style="'+TH+'">위치</th>'
      +'<th style="'+TH+'text-align:left;padding-left:8px">품번/품명</th>'
      +'<th style="'+TH+'">소요량</th>'
      +'<th style="'+TH+'">적입</th>'
      +'<th style="'+TH+'">잔량</th>'
      +'<th style="'+TH+'">박스</th>'
      +'<th style="font-size:10px;color:#64748b;font-weight:700;text-align:center;padding:5px 2px">출고</th>'
      +'</tr>';

    var out='<div style="display:flex;flex-direction:column;gap:10px">';
    var no=0;

    lineOrder.forEach(function(ln){
      var lg=lineGroups[ln];
      var lineDone=lg.items.filter(function(m){
        var ck=((m.code||'')+'_'+ln+'_'+currentTimeSlot).replace(/[^a-zA-Z0-9_\-]/g,'_');
        return checkedItems[ck];
      }).length;
      var lineAllDone=lg.items.length>0&&lineDone===lg.items.length;

      out+='<div style="border-radius:12px;overflow:hidden;box-shadow:0 3px 14px rgba(26,52,114,.14);border:1.5px solid '+(lineAllDone?'#16a34a':'#cbd5e1')+'">';
      // 라인 헤더
      out+='<div style="background:'+(lineAllDone?'#15803d':'#1a3472')+';padding:9px 12px;'
        +'display:flex;align-items:center;justify-content:space-between">'
        +'<div style="display:flex;align-items:center;gap:7px">'
          +'<span style="font-size:15px">'+(lineAllDone?'✅':'📦')+'</span>'
          +'<span style="font-size:15px;font-weight:800;color:#fff;letter-spacing:-.01em">'+esc(lg.line_name)+'</span>'
        +'</div>'
        +'<span style="font-size:13px;font-weight:700;background:rgba(255,255,255,.2);color:#fff;padding:2px 9px;border-radius:20px">'+lineDone+'/'+lg.items.length+'</span>'
      +'</div>';

      out+='<table style="width:100%;border-collapse:collapse;table-layout:fixed">'
        +'<colgroup>'
          +'<col style="width:16px">'   // No
          +'<col style="width:34px">'   // 위치
          +'<col>'                       // 품번/품명 (auto)
          +'<col style="width:46px">'   // 소요량
          +'<col style="width:44px">'   // 적입
          +'<col style="width:44px">'   // 잔량
          +'<col style="width:40px">'   // 박스
          +'<col style="width:44px">'   // 출고
        +'</colgroup>'
        +'<thead>'+colHeader+'</thead><tbody>';

      lg.items.forEach(function(m){
        no++;
        var ck=((m.code||'')+'_'+ln+'_'+currentTimeSlot).replace(/[^a-zA-Z0-9_\-]/g,'_');
        var isChecked=!!checkedItems[ck];
        var pq=m.pack_qty||0;
        var ceilo=pq>0?Math.ceil(m.qty/pq):(m.box_count||0);
        var rem=pq>0&&ceilo>0?(ceilo*pq-m.qty):0;
        var dim=isChecked?'opacity:.3;':'';
        var rowBg=isChecked?'#f0fdf4':'#fff';
        var BR='border-right:1px solid #e2e8f0;';
        var VM='vertical-align:middle;';

        out+='<tr style="background:'+rowBg+';border-bottom:1px solid #e8eef5">';

        // No
        out+='<td style="text-align:center;'+VM+BR+'padding:4px 2px;'+dim+'">'
          +'<span style="font-size:11px;font-weight:700;color:#94a3b8">'+no+'</span></td>';

        // 위치
        out+='<td style="text-align:center;'+VM+BR+'padding:3px 2px;background:#f8fafc;'+dim+'">'
          +'<span style="font-size:11px;font-weight:800;color:#1a3472;word-break:break-all;line-height:1.3">'+esc(m.location||'-')+'</span></td>';

        // 품번/품명
        out+='<td style="padding:6px 6px 6px 8px;'+VM+BR+'overflow:hidden;min-width:0;'+dim+'">'
          +'<div style="font-size:13px;font-weight:900;color:#0f172a;font-family:\'Courier New\',monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(m.code||'')+'</div>'
          +'<div style="font-size:10px;font-weight:500;color:#475569;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px">'+esc(m.name||'')+'</div>'
          +(m.vendor?'<div style="font-size:9px;font-weight:700;color:#0f172a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px">'+esc(m.vendor)+'</div>':'')
          +'</td>';

        // 소요량
        var NSTYLE='overflow:hidden;white-space:nowrap;';
        out+='<td style="text-align:center;'+VM+BR+'padding:4px 1px;overflow:hidden;'+dim+'">'
          +'<div style="'+NSTYLE+'font-size:14px;font-weight:900;color:#0f172a;line-height:1">'+fmtQty(m.qty)+'</div>'
          +'<div style="font-size:9px;color:#94a3b8;margin-top:1px">ea</div>'
          +'</td>';

        // 적입수량 (pack_qty)
        var pqShow = m.pack_qty||0;
        out+='<td style="text-align:center;'+VM+BR+'padding:4px 1px;overflow:hidden;'+dim+'">'
          +(pqShow>0
            ?'<div style="'+NSTYLE+'font-size:13px;font-weight:700;color:#475569;line-height:1">'+fmtQty(pqShow)+'</div>'
             +'<div style="font-size:9px;color:#94a3b8;margin-top:1px">ea</div>'
            :'<div style="font-size:13px;color:#d1d5db">—</div>')
          +'</td>';

        // 잔량
        out+='<td style="text-align:center;'+VM+BR+'padding:4px 1px;overflow:hidden;'+dim+'">'
          +(rem>0
            ?'<div style="'+NSTYLE+'font-size:13px;font-weight:800;color:#dc2626;line-height:1">'+fmtQty(rem)+'</div>'
             +'<div style="font-size:9px;color:#dc2626;margin-top:1px">잔</div>'
            :(ceilo>0
              ?'<div style="'+NSTYLE+'font-size:10px;font-weight:700;color:#16a34a;line-height:1.3">완박스</div>'
              :'<div style="font-size:13px;color:#d1d5db">—</div>'))
          +'</td>';

        // 박스
        out+='<td style="text-align:center;'+VM+BR+'padding:4px 1px;overflow:hidden;'+dim+'">'
          +(ceilo>0
            ?'<div style="'+NSTYLE+'font-size:14px;font-weight:900;color:#92400e;line-height:1">'+ceilo+'</div>'
             +'<div style="font-size:9px;color:#92400e;margin-top:1px">bx</div>'
            :'<div style="font-size:13px;color:#d1d5db">—</div>')
          +'</td>';

        // 출고
        out+='<td style="text-align:center;'+VM+'padding:4px 2px">'
          +'<button onclick="toggleCheck(\''+ck+'\')" '
          +'style="width:40px;height:40px;border-radius:10px;border:2px solid '+(isChecked?'#22c55e':'#d1d5db')+';'
          +'background:'+(isChecked?'#dcfce7':'#fff')+';font-size:22px;cursor:pointer;'
          +'display:flex;align-items:center;justify-content:center;margin:auto;'
          +'-webkit-tap-highlight-color:transparent;touch-action:manipulation">'
          +(isChecked?'✅':'☐')+'</button></td>';

        out+='</tr>';
      });

      out+='</tbody></table></div>';
    });
    return out+'</div>';
  }

  var html='<div>';
  html+=tabsHtml;
  html+=lineOrder.length ? buildTable()
    : '<div class="empty-state"><div class="empty-icon">📭</div>'
      +'<div class="empty-msg">'+slotLabels[currentTimeSlot]+' 확정 자재 없음</div>'
      +'<div class="empty-sub">반장이 mrp_calculator에서 확정해주세요</div></div>';
  html+='</div><div style="height:60px"></div>';
  main.innerHTML=html;
}

  var body = document.getElementById(id);
  var idx = id.replace('line-','');
  var toggle = document.getElementById('toggle-'+idx);
  if(!body) return;
  var collapsed = body.style.display === 'none';
  body.style.display = collapsed ? '' : 'none';
  toggle.classList.toggle('collapsed', !collapsed);
}

// ── 유틸 ──────────────────────────────────────────────────────
function fmtQty(n){
  var v = parseFloat(n) || 0;
  return (v%1===0) ? Number(v).toLocaleString() : Number(v).toFixed(2);
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

  var am=(data.am||[]).length, pm=(data.pm||[]).length;
  var a=(data.a||[]).length, b=(data.b||[]).length, c=(data.c||[]).length, d=(data.d||[]).length;
  var fc=(data.am&&data.am[0]&&data.am[0].code)||'';
  return am+'_'+pm+'_'+a+'_'+b+'_'+c+'_'+d+'_'+fc;
}

async function getPushStatus() {
  if (!isPushSupported()) return 'unsupported';
  if (Notification.permission === 'denied') return 'denied';
  try {
    var reg = await navigator.serviceWorker.ready;
    var sub = await reg.pushManager.getSubscription();
    return sub ? 'subscribed' : 'unsubscribed';
  } catch(e) { return 'unsubscribed'; }
}

async function updatePushUI() {
  var btn = document.getElementById('pushToggleBtn');
  var txt = document.getElementById('pushStatusTxt');
  if (!isPushSupported()) {
    if (btn) btn.style.display = 'none';
    if (txt) txt.textContent = '이 브라우저는 푸시 미지원';
    return;
  }
  var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  if (isIOS && !window.navigator.standalone) {
    var guide = document.getElementById('iosGuide');
    if (guide) guide.style.display = 'block';
    if (btn) btn.style.display = 'none';
    if (txt) txt.textContent = '';
    return;
  }
  var status = await getPushStatus();
  if (status === 'subscribed') {
    if (btn) { btn.textContent = '🔕 알림 끄기'; btn.dataset.action = 'off'; btn.style.background = '#ef4444'; btn.style.display = ''; }
    if (txt) txt.textContent = '✅ 알림 켜짐';
  } else if (status === 'denied') {
    if (btn) btn.style.display = 'none';
    if (txt) txt.textContent = '🚫 브라우저 설정에서 알림이 차단됨';
  } else {
    if (btn) { btn.textContent = '🔔 알림 허용'; btn.dataset.action = 'on'; btn.style.background = '#1e3a8a'; btn.style.display = ''; }
    if (txt) txt.textContent = '알림이 꺼져 있습니다';
  }
}

async function handlePushToggle() {
  var btn = document.getElementById('pushToggleBtn');
  var msg = document.getElementById('pushMsg');
  var action = (btn && btn.dataset.action) || 'on';
  if (msg) msg.textContent = '';
  try {
    if (action === 'on') {
      var perm = await Notification.requestPermission();
      if (perm !== 'granted') throw new Error('알림 권한이 거부되었습니다.');
      var swPath = location.hostname === 'aitmt6471.github.io' ? '/workorder/sw.js' : '/sw.js';
      var swScope = location.hostname === 'aitmt6471.github.io' ? '/workorder/' : '/';
      var reg = await navigator.serviceWorker.register(swPath, { scope: swScope });
      await navigator.serviceWorker.ready;
      var existing = await reg.pushManager.getSubscription();
      if (existing) await existing.unsubscribe();
      var sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
      });
      var toB64 = function(buf) { return btoa(String.fromCharCode.apply(null, new Uint8Array(buf))); };
      var p256dh = toB64(sub.getKey('p256dh'));
      var auth   = toB64(sub.getKey('auth'));
      if (!sub.endpoint || !p256dh || !auth) throw new Error('구독 정보 생성 실패');
      await fetch(N8N_BASE + '/webhook/mrp/push/subscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          endpoint: sub.endpoint, p256dh: p256dh, auth: auth,
          user_label: navigator.userAgent.substring(0, 80),
          device_info: navigator.platform
        })
      });
      if (msg) { msg.style.color = '#16a34a'; msg.textContent = '✅ 알림이 켜졌습니다!'; }
    } else {
      var reg2 = await navigator.serviceWorker.ready;
      var sub2 = await reg2.pushManager.getSubscription();
      if (sub2) {
        await fetch(N8N_BASE + '/webhook/mrp/push/unsubscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ endpoint: sub2.endpoint })
        });
        await sub2.unsubscribe();
      }
      if (msg) { msg.style.color = '#6b7280'; msg.textContent = '알림이 해제되었습니다.'; }
    }
    await updatePushUI();
  } catch(e) {
    if (msg) { msg.style.color = '#dc2626'; msg.textContent = '❌ ' + e.message; }
  }
}

async function showFirstVisitPushPopup() {
  if (!isPushSupported()) return;
  if (localStorage.getItem('push_asked')) return;
  var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  if (isIOS && !window.navigator.standalone) return;
  var status = await getPushStatus();
  if (status === 'subscribed' || status === 'denied') return;
  document.getElementById('pushPopupOv').style.display = 'flex';
}

async function pushPopupAllow() {
  document.getElementById('pushPopupOv').style.display = 'none';
  localStorage.setItem('push_asked', '1');
  var btn = document.getElementById('pushToggleBtn');
  if (btn) btn.dataset.action = 'on';
  await handlePushToggle();
}

function pushPopupLater() {
  document.getElementById('pushPopupOv').style.display = 'none';
  localStorage.setItem('push_asked', '1');
}

}
