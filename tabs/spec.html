<!-- 사양표 -->
<div class="tab-toolbar">
  <div style="display:flex;align-items:center;gap:8px">
    <span style="font-size:15px;font-weight:900;color:#1e3264;letter-spacing:2px">사양표</span>
  </div>
  <div style="flex:1"></div>
  <button class="btn btn-ghost btn-sm" id="spec-edit-btn" onclick="specToggleEdit(this)">&#x270F; 편집 모드</button>
</div>

<div style="display:flex;flex-direction:column;height:calc(100vh - 100px);overflow:hidden">

  <!-- 날짜 선택 (파란 헤더) -->
  <div style="background:#1e3264;flex-shrink:0">
    <div style="padding:10px 16px;display:flex;align-items:center;gap:10px">
      <button class="btn btn-ghost btn-sm" onclick="prevMonth('spec');specRenderDayPicker()"
        style="color:#fff;border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.08)">&#x2039;</button>
      <span id="spec-month-label" style="font-weight:700;font-size:14px;min-width:90px;text-align:center;color:#fff"></span>
      <button class="btn btn-ghost btn-sm" onclick="nextMonth('spec');specRenderDayPicker()"
        style="color:#fff;border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.08)">&#x203A;</button>
      <span style="color:rgba(255,255,255,.35);margin:0 4px">|</span>
      <span id="spec-sel-date" style="font-size:13px;font-weight:700;color:#fff;background:rgba(255,255,255,.15);padding:3px 12px;border-radius:6px;letter-spacing:.5px">날짜 선택</span>
      <div style="flex:1"></div>
      <span id="spec-car-badge" style="font-size:11px;color:rgba(255,255,255,.65);padding:2px 8px;border:1px solid rgba(255,255,255,.25);border-radius:4px"></span>
    </div>
    <div style="padding:10px 16px;border-top:1px solid rgba(255,255,255,.1)">
      <div id="spec-day-picker" style="display:flex;flex-wrap:wrap;gap:4px"></div>
    </div>
  </div>

  <!-- 메인 바디 -->
  <div style="display:flex;flex:1;min-height:0">

    <!-- 좌측: 사양표 목록 -->
    <div id="spec-table-panel" style="flex:1;min-width:0;overflow-y:auto;background:#fff;border-right:2px solid #c9d4e8">
      <div id="spec-table-wrap">
        <div style="padding:40px;text-align:center;color:#9ca3af;font-size:13px">날짜를 선택해주세요</div>
      </div>
    </div>

    <!-- 우측: 부품도 + BOM -->
    <div id="spec-detail-panel" style="flex:0 0 420px;display:none;flex-direction:column;background:#fff;min-height:0">
      <div style="background:#1e3264;color:#fff;padding:8px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0">
        <span id="spec-detail-title" style="font-size:11px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
        <button onclick="specCloseDetail()" style="background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:14px;padding:2px 4px">✕</button>
      </div>

      <!-- 부품도 사진 뷰어 -->
      <div style="flex:0 0 auto;display:flex;flex-direction:column;border-bottom:2px solid #c9d4e8">
        <div style="background:#374151;color:#e5e7eb;padding:6px 12px;font-size:10px;font-weight:700;letter-spacing:.6px;flex-shrink:0;display:flex;align-items:center;gap:8px">
          부품도 사진
          <span id="spec-photo-status" style="color:rgba(255,255,255,.4);font-weight:400"></span>
        </div>
        <div id="spec-photo-main" style="height:220px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;overflow:hidden">
          <div style="text-align:center;color:#9ca3af">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
            <div style="font-size:11px;margin-top:6px">사진 없음</div>
          </div>
        </div>
        <div style="background:#f8f9fa;padding:8px 10px;border-top:1px solid var(--border);flex-shrink:0">
          <div id="spec-photo-strip" style="display:flex;gap:8px;align-items:flex-start;overflow-x:auto;padding-bottom:2px;min-height:60px"></div>
        </div>
      </div>

      <!-- BOM 패널 -->
      <div style="flex:1;min-height:0;display:flex;flex-direction:column">
        <div style="background:#374151;color:#e5e7eb;padding:6px 12px;font-size:10px;font-weight:700;letter-spacing:.6px;flex-shrink:0">BOM 계층 구조</div>
        <div id="spec-bom-content" style="flex:1;overflow-y:auto;background:#fff">
          <div style="padding:20px;text-align:center;color:#9ca3af;font-size:12px">항목을 선택하세요</div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
(function(){
'use strict';

let _specDay = null;
let _specEditMode = false;
let _specMesItems = [];
let _specMasterItems = [];
let _specSelectedCdItem = null;
let _specPhotosData = [];
let _specBomData = [];
let _specUploading = false;

/* ── 한국 공휴일 ── */
const KR_FIXED = ['1-1','3-1','5-5','6-6','8-15','10-3','10-9','12-25'];
const KR_EXTRA = {
  2025:['1-27','1-28','1-29','3-3','10-5','10-6','10-7','10-8'],
  2026:['2-16','2-17','2-18','3-2','6-8','8-17','9-25','9-26','9-27','9-28','9-29','10-5']
};
const _subCache = {};
function _calcSubs(year){
  const s=new Set();
  [[1,1],[3,1],[5,5],[6,6],[8,15],[10,3],[10,9],[12,25]].forEach(([mo,da])=>{
    const dow=new Date(year,mo-1,da).getDay();
    let off=0; if(dow===0)off=1; else if(dow===6)off=2;
    if(off){const d=new Date(year,mo-1,da+off);s.add(`${d.getMonth()+1}-${d.getDate()}`);}
  });
  return s;
}
function _isHol(year,month,d){
  if(new Date(year,month-1,d).getDay()===0) return true;
  const md=`${month}-${d}`;
  if(KR_FIXED.includes(md)) return true;
  const ex=KR_EXTRA[year]; if(ex&&ex.includes(md)) return true;
  if(!_subCache[year])_subCache[year]=_calcSubs(year);
  return _subCache[year].has(md);
}

function _getCarModel(){
  const sel=document.getElementById('car-sel');
  if(!sel) return '';
  const n=(sel.options[sel.selectedIndex]?.text||'').toUpperCase();
  if(n.includes('GN7')) return 'GN7 FL';
  if(n.includes('CN8')) return 'CN8';
  if(n.includes('NX5')) return 'NX5';
  return '';
}

function _fmtDate(y,m,d){ return `${y}${String(m).padStart(2,'0')}${String(d).padStart(2,'0')}`; }

/* ── Day picker ── */
window.specRenderDayPicker = function(){
  const m=getTabMonth('spec');
  const days=new Date(m.year,m.month,0).getDate();
  const picker=document.getElementById('spec-day-picker');
  if(!picker) return;
  const ml=document.getElementById('spec-month-label');
  if(ml) ml.textContent=`${m.year}년 ${m.month}월`;
  picker.innerHTML=Array.from({length:days},(_,i)=>{
    const d=i+1, dow=new Date(m.year,m.month-1,d).getDay();
    const isSat=dow===6, isHol=_isHol(m.year,m.month,d), isAct=d===_specDay;
    if(isHol||isSat){
      const col=isSat?'#f87171':'#f9a8d4';
      const sel=isAct?'outline:2px solid #f87171;outline-offset:1px;':'';
      return `<button onclick="window._specSelDay(${d})"
        style="min-width:30px;height:30px;padding:0 4px;border:1px solid #fecdd3;border-radius:6px;
        background:#fff0f3;color:${col};font-size:11px;font-weight:600;cursor:pointer;${sel}">${d}</button>`;
    }
    const bg=isAct?'var(--primary)':'#fff', col=isAct?'#fff':'var(--text)', bdr=isAct?'var(--primary)':'var(--border)';
    return `<button onclick="window._specSelDay(${d})"
      style="min-width:30px;height:30px;padding:0 4px;border:1px solid ${bdr};border-radius:6px;
      background:${bg};color:${col};font-size:11px;font-weight:600;cursor:pointer">${d}</button>`;
  }).join('');
};

window._specSelDay = function(d){
  _specDay=d;
  const m=getTabMonth('spec');
  const el=document.getElementById('spec-sel-date');
  if(el) el.textContent=`${m.year}.${String(m.month).padStart(2,'0')}.${String(d).padStart(2,'0')}`;
  specRenderDayPicker();
  specLoadData(_fmtDate(m.year,m.month,d));
};

/* ── 데이터 로드 ── */
async function specLoadData(dateStr){
  const carModel=_getCarModel();
  const badge=document.getElementById('spec-car-badge');
  if(badge) badge.textContent=carModel||'전체 차종';
  const wrap=document.getElementById('spec-table-wrap');
  if(wrap) wrap.innerHTML='<div style="padding:30px;text-align:center;color:#9ca3af;font-size:13px">조회 중...</div>';
  try {
    let mesRes={data:[],count:0};
    try{ mesRes=await AIT_API.getSpecMes(dateStr,carModel); }catch(e){ console.warn('MES 조회 실패',e); }
    const masterRes=await AIT_API.getSpecMaster(carModel);
    _specMesItems=(mesRes&&mesRes.data)?mesRes.data:(Array.isArray(mesRes)?mesRes:[]);
    _specMasterItems=Array.isArray(masterRes)?masterRes:[];
    const mesSet=new Set(_specMesItems.map(m=>String(m.CD_ITEM||'').substring(0,10)));
    const noMes=_specMesItems.length===0;
    const matched=noMes?[]:_specMasterItems.filter(row=>{
      return mesSet.has((row.cd_item||'').replace(/-/g,'').substring(0,10));
    }).map(row=>{
      const raw=(row.cd_item||'').replace(/-/g,'').substring(0,10);
      const mes=_specMesItems.find(m=>String(m.CD_ITEM||'').substring(0,10)===raw)||{};
      return {...row,qt_order:mes.QT_ORDER||'',no_mmmo:mes.NO_MMMO||'',mes_cd_item:mes.CD_ITEM||''};
    });
    specRenderTable(matched,noMes);
  }catch(e){
    if(wrap) wrap.innerHTML=`<div style="padding:30px;text-align:center;color:#ef4444;font-size:13px">조회 실패: ${e.message}</div>`;
  }
}

/* ── 테이블 렌더 ── */
function specRenderTable(rows,noMes){
  const wrap=document.getElementById('spec-table-wrap');
  if(!wrap) return;
  if(noMes){
    wrap.innerHTML='<div style="padding:50px;text-align:center;color:#9ca3af;font-size:13px">해당 날짜 작업지시가 없습니다</div>'+(_specEditMode?_addBtn():'');
    return;
  }
  if(!rows.length){
    wrap.innerHTML='<div style="padding:50px;text-align:center;color:#9ca3af;font-size:13px">매핑된 사양 데이터가 없습니다</div>'+(_specEditMode?_addBtn():'');
    return;
  }
  const eCol=_specEditMode?'<th style="width:30px;padding:8px 4px"></th>':'';
  let html=`<table style="width:100%;border-collapse:collapse;font-size:12px">
    <thead><tr style="background:#1e3264;color:#fff;position:sticky;top:0;z-index:1">
      <th style="padding:8px;text-align:center;width:56px">부품도</th>
      <th style="padding:8px;text-align:left">도번</th>
      <th style="padding:8px;text-align:left">부품명</th>
      <th style="padding:8px;text-align:left;width:90px">GRADE</th>
      <th style="padding:8px;text-align:center;width:60px">차종</th>
      <th style="padding:8px;text-align:left;width:140px">완제품 품번</th>
      <th style="padding:8px;text-align:right;width:50px">수량</th>
      ${eCol}
    </tr></thead><tbody>`;
  rows.forEach(row=>{
    const tu=row.file_id?AIT_API.driveUrl(row.file_id):'';
    const thumb=tu
      ?`<img src="${tu}" style="width:44px;height:44px;object-fit:cover;border-radius:4px" onerror="this.outerHTML='<div style=&quot;width:44px;height:44px;background:#f3f4f6;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:18px&quot;>🖼</div>'">`
      :`<div style="width:44px;height:44px;background:#f3f4f6;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:18px">🖼</div>`;
    const isSel=row.cd_item===_specSelectedCdItem;
    const dCol=_specEditMode
      ?`<td style="padding:4px;text-align:center"><button onclick="event.stopPropagation();specDeleteRow(${row.id})"
          style="background:none;border:none;cursor:pointer;color:#ef4444;font-size:15px;padding:2px 5px">✕</button></td>`:'';
    html+=`<tr data-cd="${row.cd_item}" onclick="specSelectRow('${row.cd_item}')"
      style="background:${isSel?'#eef2ff':'#fff'};border-bottom:1px solid #f0f0f0;cursor:pointer">
      <td style="padding:6px 8px;text-align:center">${thumb}</td>
      <td style="padding:6px 8px;font-weight:600;color:#1e3264;font-family:monospace;font-size:11px">${row.cd_item||''}</td>
      <td style="padding:6px 8px">${row.nm_item||''}</td>
      <td style="padding:6px 8px;color:#6b7280;font-size:11px">${row.grade||''}</td>
      <td style="padding:6px 8px;text-align:center"><span style="background:#eef2ff;color:#3730a3;padding:2px 5px;border-radius:3px;font-size:10px;font-weight:600">${row.car_model||''}</span></td>
      <td style="padding:6px 8px;font-family:monospace;font-size:10px;color:#6b7280">${row.mes_cd_item||''}</td>
      <td style="padding:6px 8px;text-align:right;font-weight:600">${row.qt_order||''}</td>
      ${dCol}
    </tr>`;
  });
  wrap.innerHTML=html+'</tbody></table>'+(_specEditMode?_addBtn():'');
}

function _addBtn(){ return `<div style="padding:10px 12px"><button onclick="specShowAddRow()"
  style="width:100%;padding:8px;border:2px dashed #d1d5db;background:none;border-radius:8px;color:#6b7280;cursor:pointer;font-size:12px">＋ 항목 추가</button></div>`; }

/* ── 행 선택 ── */
window.specSelectRow = async function(cdItem){
  _specSelectedCdItem=cdItem;
  document.querySelectorAll('#spec-table-wrap tr[data-cd]').forEach(tr=>{
    tr.style.background=tr.dataset.cd===cdItem?'#eef2ff':'#fff';
  });
  const panel=document.getElementById('spec-detail-panel');
  if(panel) panel.style.display='flex';
  const master=_specMasterItems.find(m=>m.cd_item===cdItem)||{};
  const titleEl=document.getElementById('spec-detail-title');
  if(titleEl) titleEl.textContent=cdItem+(master.nm_item?' — '+master.nm_item:'');
  const st=document.getElementById('spec-photo-status');
  if(st) st.textContent='로드 중...';
  const bomArea=document.getElementById('spec-bom-content');
  if(bomArea) bomArea.innerHTML='<div style="padding:16px;text-align:center;color:#9ca3af;font-size:12px">로드 중...</div>';

  const [photos,bom]=await Promise.all([
    AIT_API.getSpecPhotos(cdItem).catch(()=>[]),
    AIT_API.getSpecBom(cdItem).catch(()=>[])
  ]);
  _specPhotosData=Array.isArray(photos)?photos:[];
  _specBomData=Array.isArray(bom)?bom:[];
  if(st) st.textContent=_specPhotosData.length?`${_specPhotosData.length}장`:'';
  specRenderPhotos(_specPhotosData);
  specRenderBom(_specBomData);
};

window.specCloseDetail=function(){
  _specSelectedCdItem=null;
  document.querySelectorAll('#spec-table-wrap tr[data-cd]').forEach(tr=>{ tr.style.background='#fff'; });
  const panel=document.getElementById('spec-detail-panel');
  if(panel) panel.style.display='none';
};

/* ── 사진 뷰어 ── */
function specRenderPhotos(photos){
  const main=document.getElementById('spec-photo-main');
  const strip=document.getElementById('spec-photo-strip');
  if(!main||!strip) return;
  if(!photos.length){
    main.innerHTML=`<div style="text-align:center;color:#9ca3af">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
      <div style="font-size:11px;margin-top:6px">사진 없음</div></div>`;
    strip.innerHTML=_specEditMode?_uploadBtn():'';
    return;
  }
  const u0=photos[0].photo_url||AIT_API.driveUrl(photos[0].file_id);
  main.innerHTML=`<img src="${u0}" style="max-width:100%;max-height:100%;object-fit:contain;cursor:zoom-in"
    onclick="if(typeof openLightbox==='function')openLightbox('${u0}','')"
    onerror="this.parentNode.innerHTML='<div style=color:#9ca3af;font-size:12px>이미지 로드 실패</div>'">`;
  strip.innerHTML=photos.map((p,i)=>{
    const url=p.photo_url||AIT_API.driveUrl(p.file_id);
    const del=_specEditMode
      ?`<button onclick="event.stopPropagation();specDeletePhoto('${p.file_id}',${p.photo_order??i})"
          style="position:absolute;top:-4px;right:-4px;background:#ef4444;color:#fff;border:none;
          border-radius:50%;width:16px;height:16px;font-size:10px;cursor:pointer;line-height:16px;padding:0">✕</button>`:'';
    return `<div style="position:relative;flex-shrink:0">
      <img src="${url}" data-idx="${i}" onclick="specPhotoSelect(${i})"
        style="width:54px;height:54px;object-fit:cover;border-radius:4px;cursor:pointer;border:2px solid ${i===0?'var(--primary)':'transparent'}"
        onerror="this.style.display='none'">${del}</div>`;
  }).join('')+(_specEditMode?_uploadBtn():'');
}

function _uploadBtn(){ return `<label style="display:flex;align-items:center;justify-content:center;
  width:54px;height:54px;border:2px dashed #d1d5db;border-radius:4px;cursor:pointer;color:#9ca3af;font-size:24px;flex-shrink:0">
  +<input type="file" accept="image/*" style="display:none" onchange="specUploadPhoto(event)"></label>`; }

window.specPhotoSelect=function(idx){
  const p=_specPhotosData[idx]; if(!p) return;
  const url=p.photo_url||AIT_API.driveUrl(p.file_id);
  const main=document.getElementById('spec-photo-main');
  if(main) main.innerHTML=`<img src="${url}" style="max-width:100%;max-height:100%;object-fit:contain;cursor:zoom-in"
    onclick="if(typeof openLightbox==='function')openLightbox('${url}','')">`;
  document.querySelectorAll('#spec-photo-strip img[data-idx]').forEach(img=>{
    img.style.border=+img.dataset.idx===idx?'2px solid var(--primary)':'2px solid transparent';
  });
};

/* ── BOM ── */
function specRenderBom(bom){
  const area=document.getElementById('spec-bom-content');
  if(!area) return;
  if(!bom.length){ area.innerHTML='<div style="padding:20px;text-align:center;color:#9ca3af;font-size:12px">BOM 정보 없음</div>'; return; }
  const clrs=['','#1e3264','#2563eb','#7c3aed','#059669','#d97706','#dc2626','#6b7280'];
  let html=`<table style="width:100%;border-collapse:collapse;font-size:11px">
    <thead><tr style="background:#f8fafc;border-bottom:2px solid #e2e8f0">
      <th style="padding:5px 8px;color:#6b7280;font-weight:600;text-align:left;width:32px">Lv</th>
      <th style="padding:5px 8px;color:#6b7280;font-weight:600;text-align:left">품번</th>
      <th style="padding:5px 8px;color:#6b7280;font-weight:600;text-align:left">부품명</th>
      <th style="padding:5px 8px;color:#6b7280;font-weight:600;text-align:left;width:65px">GRADE</th>
      <th style="padding:5px 8px;color:#6b7280;font-weight:600;text-align:left;width:45px">COLOR</th>
      <th style="padding:5px 8px;color:#6b7280;font-weight:600;text-align:right;width:36px">QTY</th>
    </tr></thead><tbody>`;
  bom.forEach(row=>{
    const lv=Math.max(1,Math.min(7,row.bom_level||1));
    const clr=clrs[lv]||'#6b7280';
    html+=`<tr style="border-bottom:1px solid #f0f4f8">
      <td style="padding:4px 8px;padding-left:${4+(lv-1)*12}px">
        <span style="display:inline-block;min-width:16px;height:16px;line-height:16px;text-align:center;border-radius:3px;background:${clr};color:#fff;font-size:9px;font-weight:700">${lv}</span></td>
      <td style="padding:4px 8px;font-family:monospace;color:#374151;font-size:10px">${row.part_no||''}</td>
      <td style="padding:4px 8px;font-weight:${lv<=2?'600':'400'}">${row.part_name||''}</td>
      <td style="padding:4px 8px;color:#6b7280;font-size:10px">${row.grade||''}</td>
      <td style="padding:4px 8px;color:#6b7280;font-size:10px">${row.color||''}</td>
      <td style="padding:4px 8px;text-align:right;font-weight:600">${row.qty||''}</td>
    </tr>`;
  });
  area.innerHTML=html+'</tbody></table>';
}

/* ── 편집 모드 ── */
window.specToggleEdit=function(btn){
  if(!_specEditMode){
    const pw=prompt('비밀번호를 입력하세요');
    if(pw!=='ait1234'){alert('비밀번호가 올바르지 않습니다.');return;}
  }
  _specEditMode=!_specEditMode;
  btn.textContent=_specEditMode?'✓ 편집 완료':'✏ 편집 모드';
  btn.style.background=_specEditMode?'#1e3264':'';
  btn.style.color=_specEditMode?'#fff':'';
  if(_specSelectedCdItem) specRenderPhotos(_specPhotosData);
  _reRender();
};

function _reRender(){
  const m=getTabMonth('spec');
  if(_specDay) specLoadData(_fmtDate(m.year,m.month,_specDay));
}

/* ── CRUD ── */
window.specShowAddRow=async function(){
  const cdItem=prompt('도번 입력 (예: 928A2-N1010):'); if(!cdItem) return;
  const nmItem=prompt('부품명 입력:'); if(!nmItem) return;
  const grade=prompt('GRADE/사출COLOR:')||'';
  const carModel=_getCarModel()||prompt('차종 (GN7 FL / CN8 / NX5):')||'';
  try{
    await AIT_API.createSpecMaster({cd_item:cdItem.trim(),nm_item:nmItem.trim(),grade,car_model:carModel,sort_order:999});
    showToast('항목 추가 완료','success'); _reRender();
  }catch(e){ showToast('추가 실패: '+e.message,'error'); }
};

window.specDeleteRow=async function(id){
  if(!confirm('이 항목을 삭제하시겠습니까?')) return;
  try{
    await AIT_API.deleteSpecMaster(id);
    showToast('삭제 완료','success');
    if(_specSelectedCdItem) specCloseDetail();
    _reRender();
  }catch(e){ showToast('삭제 실패: '+e.message,'error'); }
};

/* ── 사진 업로드/삭제 ── */
window.specUploadPhoto=async function(evt){
  if(_specUploading||!_specSelectedCdItem) return;
  const file=evt.target.files[0]; if(!file) return;
  _specUploading=true;
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      showSaving();
      const res=await AIT_API.uploadSpecPhoto({cd_item:_specSelectedCdItem,photo_order:_specPhotosData.length,filename:file.name,base64:e.target.result});
      _specPhotosData.push({file_id:res.fileId,photo_url:res.url,photo_order:_specPhotosData.length,cd_item:_specSelectedCdItem});
      specRenderPhotos(_specPhotosData);
      const st=document.getElementById('spec-photo-status'); if(st) st.textContent=`${_specPhotosData.length}장`;
      showToast('업로드 완료','success');
    }catch(err){ showToast('업로드 실패: '+err.message,'error'); }
    finally{ _specUploading=false; hideSaving(); }
  };
  reader.readAsDataURL(file);
};

window.specDeletePhoto=async function(fileId,photoOrder){
  if(!confirm('사진을 삭제하시겠습니까?')) return;
  try{
    await AIT_API.deleteSpecPhoto({fileId,cd_item:_specSelectedCdItem,photo_order:photoOrder});
    _specPhotosData=_specPhotosData.filter(p=>p.file_id!==fileId);
    specRenderPhotos(_specPhotosData);
    const st=document.getElementById('spec-photo-status'); if(st) st.textContent=_specPhotosData.length?`${_specPhotosData.length}장`:'';
    showToast('사진 삭제 완료','success');
  }catch(e){ showToast('삭제 실패: '+e.message,'error'); }
};

/* ── 초기화 ── */
(function(){
  const today=new Date();
  _specDay=today.getDate();
  const sel=document.getElementById('spec-sel-date');
  if(sel) sel.textContent=`${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(_specDay).padStart(2,'0')}`;
  specRenderDayPicker();
  specLoadData(_fmtDate(today.getFullYear(),today.getMonth()+1,_specDay));
})();

})();
</script>
